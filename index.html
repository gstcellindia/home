<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Site Under Maintenance</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c0f;
      --surface: #13151a;
      --border: #2a2d35;
      --accent: #e8c547;
      --text: #e5e7eb;
      --muted: #6b7280;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,197,71,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,197,71,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(232,197,71,0.07) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 56px 64px;
      max-width: 620px;
      width: 90%;
      text-align: center;
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--accent);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      animation: fadeUp 0.9s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      line-height: 1.15;
      color: #fff;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.9s 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    h1 span {
      color: var(--accent);
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--accent);
      margin: 24px auto;
      opacity: 0;
      animation: fadeUp 0.9s 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    p {
      font-size: 13px;
      line-height: 1.8;
      color: var(--muted);
      font-weight: 300;
      opacity: 0;
      animation: fadeUp 0.9s 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .meta {
      margin-top: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--border);
      border-top: 1px solid var(--border);
      padding-top: 24px;
      opacity: 0;
      animation: fadeUp 0.9s 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .meta span { color: var(--muted); }

    /* Progress bar */
    .progress-wrap {
      margin-top: 36px;
      opacity: 0;
      animation: fadeUp 0.9s 0.62s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 2px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 72%;
      background: var(--accent);
      animation: fillBar 2s 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fillBar {
      from { width: 0; }
      to   { width: 72%; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="status-row">
      <div class="dot"></div>
      Scheduled Maintenance
    </div>

    <h1>We'll be back<br>shortly<span>.</span></h1>

    <div class="divider"></div>

    <p>
      Our site is currently down for scheduled maintenance.<br>
      We're making improvements to serve you better.<br>
      Please check back soon — we appreciate your patience.
    </p>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Maintenance Progress</span>
        <span>72%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div class="meta">
      <span>EST. RETURN — TBD</span>
      <span>SYSTEM OFFLINE</span>
    </div>
  </div>
</body>
</html>
